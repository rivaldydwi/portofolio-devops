name: Deploy to Local Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Install dependencies
        run: npm install

      - name: Fix permissions
        run: chmod +x ./node_modules/.bin/*

      - name: Run lint
        run: npx htmlhint *.html

      - name: Build project
        run: npm run build

      # ── SECURITY: Scan source code & dependencies ──────────────────────────
      - name: Trivy - Scan filesystem (source & deps)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          output: trivy-fs-report.txt

      - name: Upload filesystem scan report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: trivy-fs-report.txt
      # ───────────────────────────────────────────────────────────────────────

      - name: Build Docker image
        run: docker build -t rivaldydwi/portofolio-devops .

      # ── SECURITY: Scan Docker image ─────────────────────────────────────────
      - name: Trivy - Scan Docker image
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: rivaldydwi/portofolio-devops
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          output: trivy-image-report.txt

      - name: Upload image scan report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-report.txt
      # ───────────────────────────────────────────────────────────────────────

      - name: Push Docker image
        run: docker push rivaldydwi/portofolio-devops

      # ── TAILSCALE: Connect runner ke network lokal ─────────────────────────
      - name: Connect Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
      # ───────────────────────────────────────────────────────────────────────

      - name: Deploy to Local Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.LOCAL_HOST }}
          username: ${{ secrets.LOCAL_USER }}
          key: ${{ secrets.LOCAL_SSH_KEY }}
          script: |
            sudo docker stop portofolio || true
            sudo docker rm portofolio || true
            sudo docker pull rivaldydwi/portofolio-devops:latest
            sudo docker run -d -p 8080:80 --name portofolio rivaldydwi/portofolio-devops:latest

      - name: Notify Slack (Success)
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"✅ Deploy SUCCESS: Portofolio-devops updated on local server!"}' \
          ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack (Failure)
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"❌ Deploy FAILED: Check GitHub Actions!"}' \
          ${{ secrets.SLACK_WEBHOOK_URL }}