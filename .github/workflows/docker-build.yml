name: Deploy to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Install dependencies
        run: npm install

      - name: Fix permissions
        run: chmod +x ./node_modules/.bin/*

      - name: Run lint
        run: npx htmlhint *.html

      - name: Build project
        run: npm run build

      - name: Build Docker image
        run: docker build -t rivaldydwi/portofolio-devops .

      - name: Push Docker image
        run: docker push rivaldydwi/portofolio-devops

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker stop $(sudo docker ps -q) || true
            sudo docker rm $(sudo docker ps -aq) || true
            sudo docker pull rivaldydwi/portofolio-devops:latest
            sudo docker run -d -p 80:80 rivaldydwi/portofolio-devops:latest

      - name: Notify Slack (Success)
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"✅ Deploy SUCCESS: Portofolio-devops updated!"}' \
          ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack (Failure)
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"❌ Deploy FAILED: Check GitHub Actions!"}' \
          ${{ secrets.SLACK_WEBHOOK_URL }}

